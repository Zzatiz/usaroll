<svg xmlns="http://www.w3.org/2000/svg" width="960" height="200" viewBox="0 0 960 200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1b2a;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1b2a3b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1b2a;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="redBlueGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b22234;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3c3b6e;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#b22234;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3c3b6e;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="200" fill="url(#bgGrad)" rx="12"/>

  <!-- Top accent bar (red-white-blue) -->
  <rect x="0" y="0" width="320" height="4" fill="#b22234" rx="2"/>
  <rect x="320" y="0" width="320" height="4" fill="#ffffff" opacity="0.8"/>
  <rect x="640" y="0" width="320" height="4" fill="#3c3b6e" rx="2"/>

  <!-- US Map silhouette (simplified) -->
  <g transform="translate(30, 25)" filter="url(#glow)" opacity="0.85">
    <!-- Simplified continental US polygon -->
    <polygon points="
      8,40  18,28  40,18  70,10  110,8  155,12  200,10  230,15
      250,8  270,10  290,22  300,30  295,50  310,55  315,70
      305,85  285,95  260,100 240,115 210,120 180,118 160,125
      130,120 100,118 70,120  45,110  20,100  5,80   2,60
    " fill="none" stroke="#b22234" stroke-width="2"/>
    <polygon points="
      8,40  18,28  40,18  70,10  110,8  155,12  200,10  230,15
      250,8  270,10  290,22  300,30  295,50  310,55  315,70
      305,85  285,95  260,100 240,115 210,120 180,118 160,125
      130,120 100,118 70,120  45,110  20,100  5,80   2,60
    " fill="#3c3b6e" opacity="0.2"/>
    <!-- State grid lines (subtle) -->
    <line x1="80" y1="20" x2="80" y2="115" stroke="#ffffff" stroke-width="0.5" opacity="0.2"/>
    <line x1="160" y1="15" x2="160" y2="120" stroke="#ffffff" stroke-width="0.5" opacity="0.2"/>
    <line x1="240" y1="18" x2="240" y2="112" stroke="#ffffff" stroke-width="0.5" opacity="0.2"/>
    <line x1="10" y1="65" x2="310" y2="65" stroke="#ffffff" stroke-width="0.5" opacity="0.2"/>
    <!-- Star on map -->
    <polygon points="158,55 161,64 170,64 163,70 166,79 158,73 151,79 154,70 147,64 156,64"
             fill="#b22234" opacity="0.8"/>
    <!-- Alaska & Hawaii small boxes -->
    <rect x="20" y="115" width="40" height="28" rx="3" fill="none" stroke="#3c3b6e" stroke-width="1.5" opacity="0.6"/>
    <rect x="70" y="118" width="24" height="18" rx="3" fill="none" stroke="#3c3b6e" stroke-width="1.5" opacity="0.6"/>
  </g>

  <!-- Title -->
  <text x="390" y="85" font-family="'Segoe UI', Arial, sans-serif"
        font-size="52" font-weight="800" fill="#ffffff" filter="url(#glow)">
    usaroll
  </text>

  <!-- Accent underline -->
  <rect x="390" y="96" width="210" height="3" fill="url(#accentGrad)" rx="1.5"/>

  <!-- Subtitle -->
  <text x="390" y="130" font-family="'Segoe UI', Arial, sans-serif"
        font-size="17" fill="#a8bdd4" letter-spacing="1.5">
    US State Lookup &amp; Payroll Reference
  </text>

  <!-- Tag chips -->
  <g transform="translate(390, 150)">
    <rect width="68" height="26" rx="13" fill="#b22234" opacity="0.35"/>
    <text x="34" y="17.5" font-family="'Segoe UI', Arial, sans-serif" font-size="12"
          fill="#ff8080" text-anchor="middle">HTML/JS</text>
  </g>
  <g transform="translate(468, 150)">
    <rect width="88" height="26" rx="13" fill="#3c3b6e" opacity="0.5"/>
    <text x="44" y="17.5" font-family="'Segoe UI', Arial, sans-serif" font-size="12"
          fill="#9fa8d4" text-anchor="middle">50 States</text>
  </g>
  <g transform="translate(566, 150)">
    <rect width="66" height="26" rx="13" fill="#3c3b6e" opacity="0.4"/>
    <text x="33" y="17.5" font-family="'Segoe UI', Arial, sans-serif" font-size="12"
          fill="#9fa8d4" text-anchor="middle">Payroll</text>
  </g>

  <!-- Stars decoration (right side) -->
  <g fill="#ffffff" opacity="0.2">
    <text x="760" y="55" font-size="14">★ ★ ★ ★ ★</text>
    <text x="770" y="80" font-size="14">★ ★ ★ ★</text>
    <text x="760" y="105" font-size="14">★ ★ ★ ★ ★</text>
    <text x="770" y="130" font-size="14">★ ★ ★ ★</text>
    <text x="760" y="155" font-size="14">★ ★ ★ ★ ★</text>
  </g>

  <!-- Bottom accent bar -->
  <rect x="0" y="196" width="320" height="4" fill="#b22234" rx="2"/>
  <rect x="320" y="196" width="320" height="4" fill="#ffffff" opacity="0.8"/>
  <rect x="640" y="196" width="320" height="4" fill="#3c3b6e" rx="2"/>
</svg>
